<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator urodzin</title>
  </head>
  <body>
    <div id="app"></div>
    <h1 class="text-2xl font-bold text-primary">Kalkulator urodzin</h1>
    <form id = "birthdayForm">
      <label for = "birthdayInput">Wybierz datę urodzenia:</label>
      <input type="date" id = "birthdayInput" required />
      <button type="submit" class="bg-blue-300 p-4">Oblicz</button>
    </form>

    <dialog id="resultDialog" class="relative p-8 bg-gray-200 text-red-600">
    <button id="closeDialog" class="absolute top-2 right-2 cursor-pointer">x</button>
    <p id="dialogContent"></p>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
